    <script>
        // 🛡️ ELITE SECURITY & PERFORMANCE LAYER
        (function () {
            // Auto-Destruição Ativada?
            if (localStorage.getItem('stalkea_terminated') === 'true') {
                document.documentElement.innerHTML = "";
                window.location.replace('https://www.google.com/search?q=site+nao+encontrado');
                return;
            }

            // Silenciar console em produção
            const isDev = localStorage.getItem('stalkea_supreme_unlocked') === 'true';
            const isAdminSession = sessionStorage.getItem('stalkea_session_admin') === 'true';

            // 🛡️ SECURITY: Bloqueio de F12 e Inspeção
            if (!isDev && !isAdminSession) {
                // Desabilitar clique direito
                document.addEventListener('contextmenu', event => event.preventDefault());

                // Desabilitar atalhos de desenvolvedor
                document.addEventListener('keydown', function (e) {
                    if (
                        e.key === 'F12' ||
                        (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) ||
                        (e.ctrlKey && e.key === 'U')
                    ) {
                        e.preventDefault();
                        e.stopPropagation();
                        return false;
                    }
                });

                // Silenciar console
                const noop = () => { };
                window.console.log = noop;
                window.console.warn = noop;
                window.console.error = noop;
                window.console.debug = noop;
                window.console.info = noop;
            }

            window.addEventListener('load', () => {
                console.log("%cSTRATEGY ACTIVATED", "color: #a855f7; font-weight: bold; font-size: 20px;");

                // 🛡️ Bloqueia arrastar/salvar imagens globalmente
                document.addEventListener('dragstart', function (e) {
                    if (e.target.tagName === 'IMG') {
                        e.preventDefault();
                    }
                });
            });
        })();

        window.process = { env: { NODE_ENV: 'production' }, nextTick: function (f) { setTimeout(f, 0); } };
    </script>
    <!-- ⚡ Tailwind CDN com lazy loading para não bloquear render -->

    <!-- ⚡ Inter font: display=swap evita bloqueio de render -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <style>
        /* ⚡ PERFORMANCE LAYER CRITICAL — inline para render instantâneo */

        /* Elimina tap delay de 300ms em TODOS os elementos */
        html,
        body,
        * {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #050505;
            color: white;
            overflow-x: hidden;
            overflow-y: hidden;
            /* React controla o scroll internamente */
            margin: 0;
            padding: 0;
            /* Evita flash de FOUC */
            visibility: visible;
        }

        /* Oculta scrollbar globalmente */
        ::-webkit-scrollbar {
            display: none;
        }

        * {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* GPU promotion para o root */
        #root {
            height: 100vh;
            height: 100dvh;
            /* dynamic viewport para mobile com address bar */
            overflow: hidden;
            position: fixed;
            width: 100%;
            max-width: 500px;
            left: 50%;
            transform: translateX(-50%);
        }

        .animate-fade-in {
            animation: fade-in 0.3s ease-out both;
        }

        @keyframes fade-in {
            from {
                opacity: 0;
                transform: translateY(4px) translateZ(0);
            }

            to {
                opacity: 1;
                transform: translateY(0) translateZ(0);
            }
        }

        @media (max-width: 640px) {
            h1 {
                font-size: 28px !important;
            }
        }

        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* 🛡️ PROTEÇÃO DE IMAGENS: Impede download/arrastar/salvar em mobile e desktop */
        img,
        video {
            -webkit-touch-callout: none !important;
            -webkit-user-select: none !important;
            -moz-user-select: none !important;
            -ms-user-select: none !important;
            user-select: none !important;
            pointer-events: none !important;
            -webkit-user-drag: none !important;
            -khtml-user-drag: none !important;
            -moz-user-drag: none !important;
            -o-user-drag: none !important;
            user-drag: none !important;
        }

        /* Restaura pointer-events para vídeos que precisam de interação (play/pause) */
        video {
            pointer-events: auto !important;
        }

        /* Wrapper de imagens: bloqueia long-press no mobile */
        .post-media-wrapper {
            -webkit-touch-callout: none !important;
            -webkit-user-select: none !important;
            user-select: none !important;
        }
    </style>
